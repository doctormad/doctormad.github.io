<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Mad - Coming Soon</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevents scrollbars during animation */
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        img {
            max-width: 250px; /* Adjust size as needed */
            height: auto;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* The Rolling/Typing Animation */
        .typing-text {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            border-right: 3px solid #333; /* The cursor */
            white-space: nowrap;
            overflow: hidden;
            width: 0; /* Start hidden */
            animation: 
                typing 2.5s steps(30, end) forwards, 
                blink .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #333 }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="doctormad.png" alt="Logo">
        
        <div class="typing-text">
            Hello world, coming soon!
        </div>
    </div>

</body>
</html>
